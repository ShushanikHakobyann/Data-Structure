<!DOCTYPE html>
<html>

<head>
    <title>Flight Connection Optimizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>

    <div class="container">

        <h1>✈ Flight Connection Optimizer</h1>

        <p>Select an option:</p>

        <select id="option">
            <option value="1">Cheapest Route</option>
            <option value="2">Fastest Route</option>
            <option value="3">Reachable Airports</option>
            <option value="4">Critical Airports</option>
        </select>

        <br><br>

        <input id="source" placeholder="Source Airport">
        <input id="destination" placeholder="Destination (if needed)">
        <input id="k" placeholder="K stops (if needed)">

        <br><br>

        <button onclick="runDemo()">Run Algorithm</button>

        <div id="output"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
